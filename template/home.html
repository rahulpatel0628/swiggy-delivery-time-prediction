<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delivery Time Predictor</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="container">
    <h1>🚀 Swiggy Delivery Time Predictor</h1>
    <p>MLOps Powered Application</p>

    <div class="card">
        <form id="form">

            <input type="number" id="age" placeholder="Age" required>
            <input type="text" id="ratings" placeholder="Ratings" required>
            <input type="text" id="weather" placeholder="Weather" required>
            <input type="text" id="traffic" placeholder="Traffic" required>
            <input type="text" id="city" placeholder="City" required>

            <button type="submit">Predict</button>

        </form>

        <div id="loading" class="hidden">⏳ Predicting...</div>
        <div id="result"></div>
    </div>
</div>

<script src="/static/js/main.js"></script>

</body>
</html>
